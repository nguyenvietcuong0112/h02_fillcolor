name: h02_colorfill
description: "ColorFlow - A relaxing coloring book app with beautiful images"
publish_to: 'none'

version: 1.0.1+101

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Monetization
  purchases_flutter: ^8.1.0
  get_it: ^7.6.4
  ds_ads:
    path: packages/ds_ads

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_remote_config: ^5.1.3
  firebase_crashlytics: ^4.0.4
  firebase_messaging: ^15.0.4
  appsflyer_sdk: ^6.15.1
  google_mobile_ads: ^5.2.0

  shimmer: ^3.0.0


  # Image & Share
  image_gallery_saver: ^2.0.3
  share_plus: ^10.1.2
  path: ^1.9.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_screenutil: ^5.9.3
  flex_color_picker: ^3.7.2
  url_launcher: ^6.3.2
  in_app_review: ^2.0.11

  injectable: ^2.6.0
  get: ^4.6.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1
  injectable_generator: ^2.4.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
